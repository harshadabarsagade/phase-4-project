<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Summarizer</title>
  <link rel="stylesheet" href="quick.css">
</head>

<body>
  <h1>Quick Summarizer</h1>

  <!-- INPUT BOX WRAPPER -->
  <div class="paste-box">
    <textarea id="textInput" rows="10" cols="50" placeholder="Paste text here..."></textarea>
  </div>

  <br>

  <button onclick="summarizeText()">Summarize</button>

  <h2>Summary:</h2>

  <!-- OUTPUT BOX WRAPPER -->
  <div class="summary-box">
    <div id="summaryOutput" style="white-space: pre-wrap;"></div>
  </div>

  <script src="quick.js"></script>
</body>
</html>
